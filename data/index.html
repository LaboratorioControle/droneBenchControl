<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drone Bench</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: #1e293b;
      border-bottom: 1px solid #0e7490;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      color: #06b6d4;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .conn-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #334155;
      transition: background 0.4s;
    }
    .dot.on { background: #22c55e; }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      background: #1e293b;
      border-bottom: 1px solid #0e7490;
    }

    .tab {
      flex: 1;
      padding: 12px 6px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #64748b;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab:hover { color: #94a3b8; }
    .tab.active { color: #06b6d4; border-bottom-color: #06b6d4; }

    /* ── Page sections ── */
    .page { display: none; padding: 20px; max-width: 520px; margin: 0 auto; }
    .page.active { display: block; }

    /* ── Cards ── */
    .card {
      background: #1e293b;
      border: 1px solid #0e7490;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      color: #67e8f9;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 16px;
    }

    /* ── Telemetry grid ── */
    .tele-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .tele-item {
      background: #0f172a;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 16px;
    }

    .tele-lbl {
      font-size: 0.65rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .tele-val {
      font-size: 1.4rem;
      font-weight: 700;
      color: #67e8f9;
      margin-top: 6px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Config fields ── */
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }

    .field label {
      display: block;
      font-size: 0.7rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    input[type="number"] {
      width: 100%;
      padding: 10px 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
      appearance: textfield;
    }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus { border-color: #06b6d4; }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 13px;
      font-size: 0.875rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: background 0.15s;
    }

    .btn-primary { background: #06b6d4; color: #0f172a; }
    .btn-primary:hover { background: #0891b2; }
    .btn-primary:active { background: #0e7490; }

    .btn-danger { background: transparent; color: #f87171; border: 1px solid #f87171; }
    .btn-danger:hover { background: rgba(248,113,113,0.1); }

    /* ── Status line ── */
    .status {
      text-align: center;
      margin-top: 12px;
      font-size: 0.8rem;
      min-height: 18px;
      color: #06b6d4;
      letter-spacing: 0.04em;
    }
    .status.error { color: #f87171; }

    /* ── Mode toggle ── */
    .btn-mode {
      display: block;
      width: 100%;
      padding: 16px;
      font-size: 0.875rem;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: background 0.2s;
      margin-bottom: 16px;
    }

    .btn-mode.control {
      background: rgba(34,197,94,0.08);
      color: #22c55e;
      border: 1px solid #22c55e;
    }
    .btn-mode.control:hover { background: rgba(34,197,94,0.18); }

    .btn-mode.test {
      background: rgba(251,146,60,0.12);
      color: #fb923c;
      border: 1px solid #fb923c;
    }
    .btn-mode.test:hover { background: rgba(251,146,60,0.22); }

    /* ── Sliders ── */
    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }

    .slider-name {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .slider-info { display: flex; align-items: center; gap: 10px; }

    .slider-dir {
      font-size: 0.65rem;
      color: #64748b;
      min-width: 68px;
      text-align: right;
    }

    .slider-val {
      font-size: 1rem;
      font-weight: 700;
      color: #e2e8f0;
      font-variant-numeric: tabular-nums;
      min-width: 36px;
      text-align: right;
    }

    input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      height: 4px;
      background: #334155;
      border-radius: 2px;
      outline: none;
      margin: 10px 0 4px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #06b6d4;
      cursor: pointer;
      transition: background 0.15s;
    }
    input[type="range"]:disabled { opacity: 0.35; cursor: not-allowed; }
    input[type="range"]:disabled::-webkit-slider-thumb { background: #475569; cursor: not-allowed; }

    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      color: #475569;
    }
  </style>
</head>
<body>

  <header class="header">
    <span class="header-title">Drone Bench</span>
    <span class="conn-badge">
      <span class="dot" id="dot"></span>
      <span id="conn-lbl">offline</span>
    </span>
  </header>

  <nav class="tab-bar">
    <button class="tab active" data-tab="telemetry">Telemetria</button>
    <button class="tab" data-tab="config">LQI</button>
    <button class="tab" data-tab="test">Teste</button>
  </nav>

  <!-- ── Telemetry ── -->
  <section id="tab-telemetry" class="page active">
    <div class="tele-grid">
      <div class="tele-item">
        <div class="tele-lbl">Pitch IMU</div>
        <div class="tele-val" id="t-pitch">--</div>
      </div>
      <div class="tele-item">
        <div class="tele-lbl">Yaw</div>
        <div class="tele-val" id="t-yaw">--</div>
      </div>
      <div class="tele-item">
        <div class="tele-lbl">Enc Pitch</div>
        <div class="tele-val" id="t-enc-pitch">--</div>
      </div>
      <div class="tele-item">
        <div class="tele-lbl">Enc Yaw</div>
        <div class="tele-val" id="t-enc-yaw">--</div>
      </div>
    </div>
  </section>

  <!-- ── LQI Config ── -->
  <section id="tab-config" class="page">
    <div class="card">
      <div class="card-title">Ganhos LQI</div>
      <div class="field"><label>K1</label><input type="number" id="k1" step="any" placeholder="0.000"></div>
      <div class="field"><label>K2</label><input type="number" id="k2" step="any" placeholder="0.000"></div>
      <div class="field"><label>K3</label><input type="number" id="k3" step="any" placeholder="0.000"></div>
      <div class="field"><label>K4</label><input type="number" id="k4" step="any" placeholder="0.000"></div>
    </div>
    <div class="card">
      <div class="card-title">Setpoints</div>
      <div class="field"><label>Pitch (°)</label><input type="number" id="pitch_sp" step="any" placeholder="0.0"></div>
      <div class="field"><label>Yaw (°)</label><input type="number" id="yaw_sp" step="any" placeholder="0.0"></div>
    </div>
    <button class="btn btn-primary" onclick="saveConfig()">Salvar</button>
    <div class="status" id="cfg-status"></div>
  </section>

  <!-- ── Test ── -->
  <section id="tab-test" class="page">
    <button class="btn-mode control" id="mode-btn" onclick="toggleMode()">
      Modo: Controle — Ativar Teste
    </button>

    <div class="card">
      <div class="card-title">Motor Pitch</div>
      <div class="slider-header">
        <span class="slider-name">Duty</span>
        <span class="slider-info">
          <span class="slider-dir" id="dir-pitch">Parado</span>
          <span class="slider-val" id="val-pitch">0</span>
        </span>
      </div>
      <input type="range" class="motor-slider" id="slider-pitch"
             min="-255" max="255" value="0"
             oninput="onSlider('pitch', this.value)" disabled>
      <div class="range-labels"><span>-255</span><span>0</span><span>+255</span></div>
    </div>

    <div class="card">
      <div class="card-title">Motor Yaw</div>
      <div class="slider-header">
        <span class="slider-name">Duty</span>
        <span class="slider-info">
          <span class="slider-dir" id="dir-yaw">Parado</span>
          <span class="slider-val" id="val-yaw">0</span>
        </span>
      </div>
      <input type="range" class="motor-slider" id="slider-yaw"
             min="-255" max="255" value="0"
             oninput="onSlider('yaw', this.value)" disabled>
      <div class="range-labels"><span>-255</span><span>0</span><span>+255</span></div>
    </div>

    <button class="btn btn-danger" onclick="stopAll()">Parar Tudo</button>
    <div class="status" id="test-status"></div>
  </section>

  <script>
    // ── Tab switching ──
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    // ── SSE telemetry ──
    const dot      = document.getElementById('dot');
    const connLbl  = document.getElementById('conn-lbl');

    function setTele(id, val, unit) {
      const el = document.getElementById(id);
      if (el) el.textContent = val !== undefined ? parseFloat(val).toFixed(2) + unit : '--';
    }

    const src = new EventSource('/api/events');
    src.addEventListener('telemetry', e => {
      try {
        const d = JSON.parse(e.data);
        setTele('t-pitch',     d.pitch,    '°');
        setTele('t-yaw',       d.yaw,      '°');
        setTele('t-enc-pitch', d.encPitch, '°');
        setTele('t-enc-yaw',   d.encYaw,   '°');
      } catch {}
    });
    src.onopen  = () => { dot.classList.add('on');  connLbl.textContent = 'online';  };
    src.onerror = () => { dot.classList.remove('on'); connLbl.textContent = 'offline'; };

    // ── LQI Config ──
    async function loadConfig() {
      try {
        const res = await fetch('/api/params');
        if (!res.ok) return;
        const d = await res.json();
        ['k1','k2','k3','k4','pitch_sp','yaw_sp'].forEach(k => {
          const el = document.getElementById(k);
          if (el && d[k] !== undefined) el.value = d[k];
        });
      } catch {}
    }

    async function saveConfig() {
      const keys = ['k1','k2','k3','k4','pitch_sp','yaw_sp'];
      const body = new URLSearchParams();
      keys.forEach(k => body.append(k, document.getElementById(k).value));
      setCfgStatus('Salvando...');
      try {
        const res = await fetch('/api/params', { method: 'POST', body });
        res.ok ? setCfgStatus('Salvo com sucesso.') : setCfgStatus('Erro ao salvar.', true);
      } catch { setCfgStatus('Sem conexao.', true); }
    }

    function setCfgStatus(msg, err = false) {
      const el = document.getElementById('cfg-status');
      el.textContent = msg;
      el.className = 'status' + (err ? ' error' : '');
    }

    // ── Test / mode toggle ──
    let testMode  = false;
    let motorTimer = null;
    let lastSend   = 0;

    function toggleMode() {
      if (testMode) {
        fetch('/api/test/control', { method: 'POST' })
          .catch(() => {})
          .finally(() => setTestMode(false));
      } else {
        setTestMode(true);
        sendMotors();
      }
    }

    function setTestMode(active) {
      testMode = active;
      const btn     = document.getElementById('mode-btn');
      const sliders = document.querySelectorAll('.motor-slider');
      if (active) {
        btn.textContent  = 'Modo: Teste — Ativar Controle';
        btn.className    = 'btn-mode test';
        sliders.forEach(s => s.disabled = false);
      } else {
        btn.textContent  = 'Modo: Controle — Ativar Teste';
        btn.className    = 'btn-mode control';
        sliders.forEach(s => s.disabled = true);
      }
    }

    function dirLabel(v) {
      return v > 0 ? 'Horário' : v < 0 ? 'Anti-Horário' : 'Parado';
    }

    function onSlider(motor, val) {
      val = parseInt(val);
      document.getElementById('val-' + motor).textContent = val;
      document.getElementById('dir-' + motor).textContent = dirLabel(val);
      if (!testMode) return;

      // throttle: fire immediately if ≥40 ms since last send, else schedule trailing call
      const now = Date.now();
      clearTimeout(motorTimer);
      if (now - lastSend >= 40) {
        lastSend = now;
        sendMotors();
      } else {
        motorTimer = setTimeout(() => { lastSend = Date.now(); sendMotors(); }, 40 - (now - lastSend));
      }
    }

    async function sendMotors() {
      const dutyPitch = document.getElementById('slider-pitch').value;
      const dutyYaw   = document.getElementById('slider-yaw').value;
      try {
        await fetch('/api/test/motors', {
          method: 'POST',
          body: new URLSearchParams({ dutyPitch, dutyYaw })
        });
      } catch {}
    }

    async function stopAll() {
      ['pitch','yaw'].forEach(m => {
        document.getElementById('slider-' + m).value = 0;
        document.getElementById('val-' + m).textContent = '0';
        document.getElementById('dir-' + m).textContent = 'Parado';
      });
      const st = document.getElementById('test-status');
      try {
        await fetch('/api/test/stop', { method: 'POST' });
        st.textContent = 'Motores parados.';
        st.className   = 'status';
      } catch {
        st.textContent = 'Sem conexao.';
        st.className   = 'status error';
      }
    }

    // stop motors if user closes / navigates away while in test mode
    window.addEventListener('pagehide', () => {
      if (testMode) navigator.sendBeacon('/api/test/stop');
    });

    loadConfig();
  </script>
</body>
</html>
