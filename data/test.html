<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste de Motor [v-OTA-test]</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container { width: 100%; max-width: 480px; }

    nav {
      text-align: center;
      margin-bottom: 24px;
    }

    nav a {
      color: #64748b;
      font-size: 0.75rem;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    nav a:hover { color: #06b6d4; }

    h1 {
      text-align: center;
      color: #06b6d4;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #0e7490;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card h2 {
      color: #67e8f9;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 20px;
    }

    .field { margin-bottom: 20px; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 0.7rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .radio-group {
      display: flex;
      gap: 12px;
    }

    .radio-group input[type="radio"] { display: none; }

    .radio-group label {
      flex: 1;
      text-align: center;
      padding: 10px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      color: #94a3b8;
      text-transform: none;
      letter-spacing: normal;
      transition: border-color 0.15s, color 0.15s;
      margin-bottom: 0;
    }

    .radio-group input[type="radio"]:checked + label {
      border-color: #06b6d4;
      color: #06b6d4;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      background: #334155;
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #06b6d4;
      cursor: pointer;
    }

    .duty-value {
      min-width: 48px;
      text-align: right;
      font-size: 1rem;
      font-weight: 700;
      color: #e2e8f0;
    }

    .duty-label {
      font-size: 0.7rem;
      color: #64748b;
      text-align: center;
      margin-top: 6px;
      letter-spacing: 0.06em;
    }

    .btn-row {
      display: flex;
      gap: 12px;
    }

    button {
      flex: 1;
      padding: 14px;
      font-size: 0.875rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: background 0.15s;
    }

    .btn-send { background: #06b6d4; color: #0f172a; }
    .btn-send:hover { background: #0891b2; }
    .btn-send:active { background: #0e7490; }

    .btn-stop { background: #1e293b; color: #f87171; border: 1px solid #f87171; }
    .btn-stop:hover { background: #f871711a; }

    .btn-control { background: #1e293b; color: #22c55e; border: 1px solid #22c55e; margin-top: 10px; width: 100%; }
    .btn-control:hover { background: #22c55e1a; }

    #status {
      text-align: center;
      margin-top: 14px;
      font-size: 0.8rem;
      min-height: 18px;
      color: #06b6d4;
      letter-spacing: 0.04em;
    }

    #status.error { color: #f87171; }

    /* Telemetria */
    .tele-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .tele-item {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 14px;
    }

    .tele-item .tele-label {
      font-size: 0.65rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .tele-item .tele-val {
      font-size: 1.1rem;
      font-weight: 700;
      color: #67e8f9;
      margin-top: 4px;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #334155;
      margin-right: 6px;
      vertical-align: middle;
    }

    .dot.connected { background: #22c55e; }
  </style>
</head>
<body>
  <div class="container">
    <nav><a href="/">← Config PID</a></nav>
    <h1>Teste de Motor</h1>

    <div class="card">
      <h2>Controle</h2>

      <div class="field">
        <label>Motor</label>
        <div class="radio-group">
          <input type="radio" name="motor" id="r-pitch" value="0" checked>
          <label for="r-pitch">Pitch</label>
          <input type="radio" name="motor" id="r-yaw" value="1">
          <label for="r-yaw">Yaw</label>
        </div>
      </div>

      <div class="field">
        <label>Duty Cycle</label>
        <div class="slider-row">
          <span style="font-size:0.7rem;color:#64748b">-255</span>
          <input type="range" id="slider" min="-255" max="255" value="0" oninput="updateDuty(this.value)">
          <span style="font-size:0.7rem;color:#64748b">255</span>
          <span class="duty-value" id="duty-display">0</span>
        </div>
        <div class="duty-label" id="duty-dir">Parado</div>
      </div>

      <div class="btn-row">
        <button class="btn-send" onclick="send()">Enviar</button>
        <button class="btn-stop" onclick="stop()">Parar</button>
      </div>
      <button class="btn-control" onclick="returnToControl()">Retornar ao Controle</button>
      <div id="status"></div>
    </div>

    <div class="card">
      <h2><span class="dot" id="dot"></span>Telemetria</h2>
      <div class="tele-grid">
        <div class="tele-item">
          <div class="tele-label">Pitch IMU</div>
          <div class="tele-val" id="t-pitch">--</div>
        </div>
        <div class="tele-item">
          <div class="tele-label">Yaw</div>
          <div class="tele-val" id="t-yaw">--</div>
        </div>
        <div class="tele-item">
          <div class="tele-label">Enc Pitch</div>
          <div class="tele-val" id="t-enc-pitch">--</div>
        </div>
        <div class="tele-item">
          <div class="tele-label">Enc Yaw</div>
          <div class="tele-val" id="t-enc-yaw">--</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function updateDuty(val) {
      val = parseInt(val);
      document.getElementById('duty-display').textContent = val;
      const dir = document.getElementById('duty-dir');
      if (val > 0)       dir.textContent = 'Sentido Horário';
      else if (val < 0)  dir.textContent = 'Sentido Anti-Horário';
      else               dir.textContent = 'Parado';
    }

    function selectedMotor() {
      return document.querySelector('input[name="motor"]:checked').value;
    }

    async function send() {
      const duty  = document.getElementById('slider').value;
      const motor = selectedMotor();
      const body  = new URLSearchParams({ motor, duty });
      setStatus('Enviando...');
      try {
        const res = await fetch('/api/test/motor', { method: 'POST', body });
        res.ok ? setStatus('OK') : setStatus('Erro ao enviar.', true);
      } catch {
        setStatus('Sem conexao.', true);
      }
    }

    async function stop() {
      document.getElementById('slider').value = 0;
      updateDuty(0);
      try {
        await fetch('/api/test/stop', { method: 'POST' });
        setStatus('Motor parado.');
      } catch {
        setStatus('Sem conexao.', true);
      }
    }

    async function returnToControl() {
      document.getElementById('slider').value = 0;
      updateDuty(0);
      try {
        const res = await fetch('/api/test/control', { method: 'POST' });
        res.ok ? setStatus('Controle PID retomado.') : setStatus('Erro.', true);
      } catch {
        setStatus('Sem conexao.', true);
      }
    }

    function setStatus(msg, isError = false) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = isError ? 'error' : '';
    }

    function setVal(id, val, unit = '') {
      const el = document.getElementById(id);
      if (el) el.textContent = val !== undefined ? (parseFloat(val).toFixed(2) + unit) : '--';
    }

    // SSE telemetria
    const dot = document.getElementById('dot');
    const src = new EventSource('/api/events');

    src.addEventListener('telemetry', e => {
      try {
        const d = JSON.parse(e.data);
        setVal('t-pitch',     d.pitch,    '°');
        setVal('t-yaw',       d.yaw,      '°');
        setVal('t-enc-pitch', d.encPitch, '°');
        setVal('t-enc-yaw',   d.encYaw,   '°');
      } catch {}
    });

    src.onopen  = () => dot.classList.add('connected');
    src.onerror = () => dot.classList.remove('connected');
  </script>
</body>
</html>
